{{ template "widget-base.html" . }}

{{- define "widget-content" }}
<style>
    .cloudflare-stats {
        display: flex;
        justify-content: space-between;
        text-align: center;
        margin-bottom: 1rem;
    }
    
    .cloudflare-stat {
        flex: 1;
    }
    
    .chart-tooltip {
        position: absolute;
        background: var(--color-popover-background);
        border: 1px solid var(--color-popover-border);
        border-radius: var(--border-radius);
        padding: 0.5rem;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.1s;
        z-index: 10;
        font-size: var(--font-size-h6);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        white-space: nowrap;
    }
    
    .chart-cursor {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 1px;
        background-color: var(--color-text-subdue);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.1s;
    }
</style>

<div class="cloudflare widget-type-cloudflare" data-widget-id="{{ .GetID }}">
    <script type="application/json" class="cloudflare-data">
        {{ .Data.Series | json }}
    </script>

    <div class="cloudflare-stats">
        <div>
            <div class="color-highlight size-h3">{{ .Data.TotalRequests | formatNumber }}</div>
            <div class="size-h6">Zapytania</div>
        </div>
        <div>
            <div class="color-highlight size-h3">{{ .Data.Threats | formatNumber }}</div>
            <div class="size-h6">Zablokowane</div>
        </div>
        <div>
            <div class="color-highlight size-h3">{{ .Data.CachedRequests | formatNumber }}</div>
            <div class="size-h6">Z cache</div>
        </div>
    </div>

    <div class="chart-container relative" style="height: 80px; width: 100%; margin-bottom: 0.5rem; cursor: crosshair;">
        <div class="chart-cursor"></div>
        <div class="chart-tooltip"></div>
        <svg viewBox="0 0 100 50" preserveAspectRatio="none" width="100%" height="100%">
            <polyline
                fill="none"
                stroke="var(--color-primary)"
                stroke-width="2"
                points="{{ .Data.ChartPoints }}"
                vector-effect="non-scaling-stroke"
            />
        </svg>
    </div>
    
    <div class="relative" style="height: 1.5rem; margin-top: -0.25rem; margin-bottom: 0.5rem; margin-right: 10px;">
        {{ range .Data.AxisLabels }}
        <div class="text-compact color-subdue" style="position: absolute; left: {{ .Left }}%; transform: {{ .Transform }}; white-space: nowrap;">
            {{ .Label }}
        </div>
        {{ end }}
    </div>
</div>
{{- end }}
